<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Time Capsule</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Send a message to your future self.</h1>
  <form id="capsule-form">
    <label>Your email
      <input type="email" name="email" placeholder="Your email here..." required />
    </label>
    <label>Message
      <textarea name="message" required></textarea>
    </label>
    <label>Deliver on
      <input type="date" name="deliverAt" required />
    </label>
    <button type="submit">Seal the capsule</button>
  </form>
  <div id="status"></div>

  <script>
    const form = document.getElementById("capsule-form");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      status.textContent = "Sealing...";

      const data = Object.fromEntries(new FormData(form));
      // Turn the date input into an ISO timestamp (delivers at 09:00 that day).
      data.deliverAt = new Date(data.deliverAt + "T09:00:00").toISOString();

      try {
        const res = await fetch("/.netlify/functions/submit-message", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error(await res.text());
        status.textContent = "✅ Sealed tight!";
        form.reset();
      } catch (err) {
        status.textContent = "❌ " + err.message;
      }
    });
  </script>
</body>

</html>
